<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artillery Duel 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Контейнер для 3D графики (Three.js) -->
    <div id="canvas-container"></div>

    <!-- Верхняя панель состояния -->
    <div id="ui-header">
        <div id="turn-indicator">Waiting for opponent...</div>
        <div id="timer-container">Time: <span id="timer">30</span> sec</div>
    </div>

    <!-- Нижняя панель управления (Кнопки) -->
    <div id="controls" class="hidden">
        <button id="btn-fire" class="active">FIRE</button>
        <button id="btn-move">MOVE</button>
    </div>

    <!-- Подключение библиотек и основного скрипта -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="app.js"></script>
</body>
</html>

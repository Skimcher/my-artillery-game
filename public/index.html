<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Artillery Duel</title>
    <style>
        /* Общие сбросы стилей */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F5F2EB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Контейнер для Three.js Canvas */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Верхняя панель состояния игры */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            pointer-events: none;
        }

        #turn-indicator {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #timer-container {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        #timer {
            font-size: 20px;
            color: #ff4757;
            font-weight: bold;
        }

        /* Нижняя панель управления действиями */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            display: flex;
            gap: 15px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #controls.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(100px);
            pointer-events: none;
        }

        /* Стили кнопок действий */
        .btn {
            border: none;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            background: #e4e7eb;
            color: #57606f;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #d2d6dc;
            color: #2f3542;
        }

        .btn.active {
            background: #2ed573;
            color: white;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);
        }

        #btn-fire.active {
            background: #ff4757;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
        }

        /* --- СТИЛИ ДИНАМИЧЕСКИХ ПОЛОСОК ЗДОРОВЬЯ (HP) НАД САУ --- */
        .hp-bar-container {
            position: absolute;
            top: 0; 
            left: 0;
            width: 70px;
            height: 14px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #1e272e;
            border-radius: 4px;
            pointer-events: none; /* Игнорируем клики мыши, чтобы не ломать Raycasting */
            z-index: 10;
            display: none; /* Включается динамически из JS */
            overflow: hidden;
            box-shadow: 0px 3px 6px rgba(0,0,0,0.4);
        }

        /* Зеленый индикатор прочности */
        .hp-bar-fill {
            height: 100%;
            background: #2ed573; 
            width: 100%;
            transition: width 0.25s ease-out;
        }

        /* Текст с цифрами поверх полоски */
        .hp-bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 10px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 1px 1px 1px #000;
        }
    </style>
</head>
<body>

    <!-- Контейнер для рендеринга 3D графики -->
    <div id="canvas-container"></div>

    <!-- HUD: Информация о ходах и времени -->
    <div id="hud">
        <div id="turn-indicator">Подключение к серверу...</div>
        <div id="timer-container">Время: <span id="timer">--</span>с</div>
    </div>

    <!-- Панель выбора действий (Огонь / Перемещение) -->
    <div id="controls" class="hidden">
        <button id="btn-fire" class="btn active">Огонь</button>
        <button id="btn-move" class="btn">Манёвр</button>
    </div>

    <!-- Зависимости: Socket.IO, Three.js и загрузчик GLTF моделей -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <!-- Основная логика игры -->
    <script src="app.js"></script>
</body>
</html>

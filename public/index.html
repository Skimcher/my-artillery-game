<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Настройка viewport для смартфонов (запрет зума, адаптивный размер) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Артиллерийская Дуэль 3D</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Отключает стандартные жесты браузера, чтобы не мешать игре */
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 80%;
            max-width: 320px;
            text-align: center;
        }

        #turn-indicator {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }

        #timer-container {
            font-size: 14px;
            color: #555;
            font-weight: 600;
        }

        #timer {
            font-size: 16px;
            color: #222;
            font-weight: 700;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }

        button {
            flex: 1; /* Кнопки делят место поровну на мобилках */
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            pointer-events: auto;
            border: none;
            border-radius: 10px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent; /* Убирает синюю рамку при клике на смартфонах */
        }

        #btn-fire {
            background-color: #ff4757;
            color: white;
        }

        #btn-fire.active {
            background-color: #ff1f35;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.6);
        }

        #btn-move {
            background-color: #2ed573;
            color: white;
        }

        #btn-move.active {
            background-color: #10ac84;
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.6);
        }

        /* Небольшая адаптация размеров шрифта под совсем маленькие экраны */
        @media (max-width: 360px) {
            #turn-indicator { font-size: 18px; }
            button { font-size: 12px; padding: 10px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="turn-indicator">Подключение...</div>
        <div id="timer-container">Время: <span id="timer">--</span> сек</div>
    </div>

    <div id="controls" class="hidden">
        <button id="btn-fire" class="active">Огонь</button>
        <button id="btn-move">Маневр</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="app.js"></script>
</body>
</html>
